<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Result Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0f1117;
      --paper:    #f7f6f2;
      --slate:    #4a4e69;
      --accent:   #3a5bef;
      --pass:     #1a7f5a;
      --pass-bg:  #e6f7f1;
      --fail:     #c0392b;
      --fail-bg:  #fdecea;
      --border:   #dddbd3;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 64px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
    }
    h1 span { color: var(--accent); }
    .sub {
      margin-top: 10px;
      font-size: 15px;
      color: var(--slate);
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 16px rgba(0,0,0,.06);
    }

    /* ── Subject Inputs ── */
    .subjects { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--slate);
    }
    .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .subject-name {
      flex: 1;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      outline: none;
    }
    .subject-name:focus { border-color: var(--accent); }

    .marks-input {
      width: 90px;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }
    .marks-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(58,91,239,.1); }
    .marks-input.error { border-color: var(--fail); background: var(--fail-bg); }

    .err-msg {
      font-size: 12px;
      color: var(--fail);
      min-height: 16px;
      display: none;
    }
    .err-msg.visible { display: block; }

    /* ── Button ── */
    .btn-row { margin-top: 28px; display: flex; gap: 10px; }
    .btn {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-reset { background: var(--paper); color: var(--slate); border: 1px solid var(--border); }
    .btn-reset:hover { background: var(--border); }

    /* ── Result Panel ── */
    #result {
      display: none;
      margin-top: 28px;
      border-top: 1px solid var(--border);
      padding-top: 28px;
    }
    #result.visible { display: block; }

    .result-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 18px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat-box {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--slate);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }
    .stat-value.grade-a { color: #1a7f5a; }
    .stat-value.grade-b { color: #1565c0; }
    .stat-value.grade-c { color: #e65100; }
    .stat-value.grade-d { color: #bf360c; }
    .stat-value.grade-f { color: var(--fail); }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      width: 100%;
      justify-content: center;
    }
    .status-badge.pass { background: var(--pass-bg); color: var(--pass); }
    .status-badge.fail { background: var(--fail-bg); color: var(--fail); }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* Subject breakdown */
    .breakdown {
      margin-top: 18px;
    }
    .breakdown-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 10px;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-bar-wrap {
      flex: 1;
      margin: 0 12px;
      height: 6px;
      background: var(--paper);
      border-radius: 99px;
      overflow: hidden;
    }
    .breakdown-bar {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }
    .breakdown-mark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      width: 36px;
      text-align: right;
    }

    /* Grade legend */
    .legend {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .legend-item {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 99px;
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--slate);
    }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Academic Performance</p>
  <h1>Student Result <span>Calculator</span></h1>
  <p class="sub">Enter marks for 5 subjects to see your result instantly.</p>
</header>

<div class="card">

  <!-- Input Section -->
  <div class="subjects" id="subjectFields">
    <!-- generated by JS -->
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="calculate()">Calculate Result</button>
    <button class="btn btn-reset" onclick="resetForm()">Reset</button>
  </div>

  <!-- Result Section -->
  <div id="result">
    <p class="result-title">Your Result</p>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Total Marks</div>
        <div class="stat-value" id="totalVal">—</div>
        <div style="font-size:11px;color:var(--slate);margin-top:4px;">out of 500</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Percentage</div>
        <div class="stat-value" id="percentVal">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Grade</div>
        <div class="stat-value" id="gradeVal">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Highest Subject</div>
        <div class="stat-value" style="font-size:16px;margin-top:4px;" id="highVal">—</div>
      </div>
    </div>

    <div id="statusBadge" class="status-badge">—</div>

    <div class="breakdown">
      <div class="breakdown-title">Subject Breakdown</div>
      <div id="breakdownRows"></div>
    </div>

    <div class="legend">
      <span class="legend-item">A: 90–100</span>
      <span class="legend-item">B: 75–89</span>
      <span class="legend-item">C: 60–74</span>
      <span class="legend-item">D: 40–59</span>
      <span class="legend-item">F: Below 40</span>
    </div>
  </div>

</div>

<script>
  const DEFAULT_SUBJECTS = ['Mathematics', 'Science', 'English', 'History', 'Computer'];

  function buildFields() {
    const container = document.getElementById('subjectFields');
    container.innerHTML = '';
    DEFAULT_SUBJECTS.forEach((name, i) => {
      container.innerHTML += `
        <div class="field">
          <div class="field-row">
            <input class="subject-name" type="text" value="${name}" id="subName${i}" placeholder="Subject name" />
            <input class="marks-input" type="number" id="marks${i}" placeholder="0–100" min="0" max="100"
              oninput="clearError(${i})" />
          </div>
          <span class="err-msg" id="err${i}"></span>
        </div>`;
    });
  }

  function clearError(i) {
    document.getElementById(`marks${i}`).classList.remove('error');
    const e = document.getElementById(`err${i}`);
    e.textContent = '';
    e.classList.remove('visible');
  }

  function getGrade(pct) {
    if (pct >= 90) return 'A';
    if (pct >= 75) return 'B';
    if (pct >= 60) return 'C';
    if (pct >= 40) return 'D';
    return 'F';
  }

  function barColor(m) {
    if (m >= 90) return '#1a7f5a';
    if (m >= 75) return '#1565c0';
    if (m >= 60) return '#e65100';
    if (m >= 40) return '#bf360c';
    return '#c0392b';
  }

  function calculate() {
    let valid = true;
    const marks = [];
    const names = [];

    for (let i = 0; i < 5; i++) {
      const raw = document.getElementById(`marks${i}`).value.trim();
      const name = document.getElementById(`subName${i}`).value.trim() || `Subject ${i+1}`;
      names.push(name);

      const errEl = document.getElementById(`err${i}`);
      const inp = document.getElementById(`marks${i}`);

      if (raw === '') {
        inp.classList.add('error');
        errEl.textContent = 'Please enter marks.';
        errEl.classList.add('visible');
        valid = false; continue;
      }
      const val = Number(raw);
      if (isNaN(val) || val < 0 || val > 100 || !Number.isInteger(val)) {
        inp.classList.add('error');
        errEl.textContent = 'Enter a whole number between 0 and 100.';
        errEl.classList.add('visible');
        valid = false; continue;
      }
      clearError(i);
      marks.push(val);
    }

    if (!valid) return;

    const total = marks.reduce((a, b) => a + b, 0);
    const pct   = (total / 500) * 100;
    const grade = getGrade(pct);
    const passed = marks.every(m => m >= 40); // pass requires each subject >= 40
    const highIdx = marks.indexOf(Math.max(...marks));

    // Update stats
    document.getElementById('totalVal').textContent   = total;
    document.getElementById('percentVal').textContent = pct.toFixed(1) + '%';
    const gradeEl = document.getElementById('gradeVal');
    gradeEl.textContent = grade;
    gradeEl.className = `stat-value grade-${grade.toLowerCase()}`;
    document.getElementById('highVal').textContent = names[highIdx];

    // Badge
    const badge = document.getElementById('statusBadge');
    badge.className = `status-badge ${passed ? 'pass' : 'fail'}`;
    badge.innerHTML = `<span class="status-dot"></span>${passed ? '🎉 PASS — Well done!' : '✗ FAIL — Keep trying!'}`;

    // Breakdown
    const bRows = document.getElementById('breakdownRows');
    bRows.innerHTML = marks.map((m, i) => `
      <div class="breakdown-row">
        <span style="width:110px;font-size:13px;">${names[i]}</span>
        <div class="breakdown-bar-wrap">
          <div class="breakdown-bar" style="width:${m}%;background:${barColor(m)}"></div>
        </div>
        <span class="breakdown-mark">${m}</span>
      </div>`).join('');

    const resultEl = document.getElementById('result');
    resultEl.classList.add('visible');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function resetForm() {
    buildFields();
    const r = document.getElementById('result');
    r.classList.remove('visible');
  }

  buildFields();
</script>
</body>
</html>
